<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Lupa Sandi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card-custom { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 40px; width: 100%; max-width: 420px; }
    </style>
</head>
<body>
<div class="card card-custom bg-white">
    <h4 class="text-center fw-bold mb-2">Pemulihan Sandi</h4>
    <p class="text-muted text-center small mb-4">Masukkan email yang terdaftar di sistem.</p>
    <div id="alertBox" class="alert d-none small" role="alert"></div>
    <form id="emailForm">
        <input type="email" id="emailInput" class="form-control form-control-lg mb-4 rounded-3" placeholder="contoh@kampus.com" required>
        <button type="submit" id="btnKirim" class="btn btn-primary btn-lg w-100 rounded-3">Kirim Instruksi</button>
    </form>
</div>
<script>
    document.getElementById('emailForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('emailInput').value;
        const btnKirim = document.getElementById('btnKirim');
        const alertBox = document.getElementById('alertBox');
        btnKirim.innerText = "Memproses..."; btnKirim.disabled = true;

        fetch('api/request_otp.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
        }).then(res => res.json()).then(data => {
            alertBox.classList.remove('d-none', 'alert-success', 'alert-danger');
            if(data.status === 'success') {
                alertBox.classList.add('alert-success');
                alertBox.innerHTML = data.pesan;
                sessionStorage.setItem('target_email', email);
                setTimeout(() => { window.location.href = 'verifikasi.html'; }, 3000);
            } else {
                alertBox.classList.add('alert-danger'); alertBox.innerText = data.pesan;
                btnKirim.innerText = "Kirim Instruksi"; btnKirim.disabled = false;
            }
        }).catch(err => {
            alertBox.classList.remove('d-none', 'alert-success');
            alertBox.classList.add('alert-danger');
            alertBox.innerText = "Sistem backend belum siap. Lanjut ke pembuatan API PHP.";
            btnKirim.innerText = "Kirim Instruksi"; btnKirim.disabled = false;
        });
    });
</script>
</body>
</html>
