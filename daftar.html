<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daftar Akun Baru</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card-custom { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 40px; width: 100%; max-width: 420px; }
    </style>
</head>
<body>
<div class="card card-custom bg-white">
    <h4 class="text-center fw-bold mb-2">Pendaftaran Akun</h4>
    <p class="text-muted text-center small mb-4">Daftarkan email baru untuk simulasi database.</p>
    <div id="alertBox" class="alert d-none small" role="alert"></div>
    <form id="regForm">
        <input type="email" id="emailInput" class="form-control form-control-lg mb-3 rounded-3" placeholder="contoh@kampus.com" required>
        <input type="password" id="passInput" class="form-control form-control-lg mb-4 rounded-3" placeholder="Buat Sandi Bebas" required>
        <button type="submit" id="btnDaftar" class="btn btn-dark btn-lg w-100 rounded-3 mb-3">Daftarkan Akun</button>
        <a href="index.html" class="btn btn-outline-secondary w-100 rounded-3">Coba Simulasi Lupa Sandi</a>
    </form>
</div>
<script>
    document.getElementById('regForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btnDaftar = document.getElementById('btnDaftar');
        const alertBox = document.getElementById('alertBox');
        btnDaftar.innerText = "Mendaftarkan..."; btnDaftar.disabled = true;

        fetch('api/register.php', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                email: document.getElementById('emailInput').value,
                password: document.getElementById('passInput').value
            })
        }).then(res => res.json()).then(data => {
            alertBox.classList.remove('d-none', 'alert-success', 'alert-danger');
            if(data.status === 'success') {
                alertBox.classList.add('alert-success'); alertBox.innerText = data.pesan;
                document.getElementById('emailInput').value = '';
                document.getElementById('passInput').value = '';
            } else {
                alertBox.classList.add('alert-danger'); alertBox.innerText = data.pesan;
            }
            btnDaftar.innerText = "Daftarkan Akun"; btnDaftar.disabled = false;
        });
    });
</script>
</body>
</html>
