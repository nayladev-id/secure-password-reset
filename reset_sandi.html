<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Buat Sandi Baru</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card-custom { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 40px; width: 100%; max-width: 420px; }
        /* Style tambahan agar saat icon di-hover terasa interaktif */
        .toggle-password { cursor: pointer; transition: color 0.2s; }
        .toggle-password:hover { color: #333 !important; }
    </style>
</head>
<body>
<div class="card card-custom bg-white">
    <h4 class="text-center fw-bold mb-2">Buat Sandi Baru</h4>
    <p class="text-muted text-center small mb-4">Pastikan sandi baru Anda kuat dan mudah diingat.</p>
    <div id="alertBox" class="alert d-none small" role="alert"></div>
    <form id="resetForm">
        
        <div class="position-relative mb-3">
            <input type="password" id="pass1" class="form-control form-control-lg rounded-3 pe-5" placeholder="Sandi Baru" required>
            <i class="bi bi-eye-slash position-absolute top-50 translate-middle-y end-0 me-3 text-muted toggle-password" id="togglePass1" style="font-size: 1.2rem;"></i>
        </div>

        <div class="position-relative mb-4">
            <input type="password" id="pass2" class="form-control form-control-lg rounded-3 pe-5" placeholder="Konfirmasi Sandi Baru" required>
            <i class="bi bi-eye-slash position-absolute top-50 translate-middle-y end-0 me-3 text-muted toggle-password" id="togglePass2" style="font-size: 1.2rem;"></i>
        </div>

        <button type="submit" id="btnSimpan" class="btn btn-success btn-lg w-100 rounded-3 mb-3">Simpan Sandi Baru</button>
    </form>
</div>

<script>
    // --- Logika Frontend Toggle Password (Baru) ---
    function setupPasswordToggle(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);

        icon.addEventListener('click', function() {
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            }
        });
    }

    // Inisialisasi fungsi toggle untuk kedua input
    setupPasswordToggle('pass1', 'togglePass1');
    setupPasswordToggle('pass2', 'togglePass2');


    // --- Logika Utama Aplikasi (Tidak Diubah) ---
    const emailTarget = sessionStorage.getItem('target_email');
    if(!emailTarget) window.location.href = 'index.html'; // Proteksi jika halamannya diakses paksa

    document.getElementById('resetForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const pass1 = document.getElementById('pass1').value;
        const pass2 = document.getElementById('pass2').value;
        const alertBox = document.getElementById('alertBox');
        const btnSimpan = document.getElementById('btnSimpan');

        // Validasi frontend: Pastikan ketikan sandi atas dan bawah sama
        if (pass1 !== pass2) {
            alertBox.classList.remove('d-none', 'alert-success');
            alertBox.classList.add('alert-danger');
            alertBox.innerText = "Sandi tidak cocok! Silakan periksa kembali.";
            return;
        }

        btnSimpan.innerText = "Menyimpan..."; btnSimpan.disabled = true;

        fetch('api/update_sandi.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: emailTarget, password: pass1 })
        }).then(res => res.json()).then(data => {
            alertBox.classList.remove('d-none', 'alert-danger');
            if(data.status === 'success') {
                alertBox.classList.add('alert-success');
                alertBox.innerText = data.pesan;
                sessionStorage.removeItem('target_email'); // Menghapus sesi setelah berhasil
                
                // Setelah 3 detik, kembalikan user ke halaman awal simulasi
                setTimeout(() => { window.location.href = 'daftar.html'; }, 3000); 
            } else {
                alertBox.classList.add('alert-danger');
                alertBox.innerText = data.pesan;
                btnSimpan.innerText = "Simpan Sandi Baru"; btnSimpan.disabled = false;
            }
        });
    });
</script>
</body>
</html>
